services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.060
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - supa-network
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == cmt-database

  # ─── PgBouncer (Novo Pooler para o Zabbix) ────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "6543:5432"
    networks:
      - supa-network
      - dokploy-network
    environment:
      DB_HOST: database-supabase-tjvayr_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      POOL_MODE: session
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      # ─── ADICIONE ESTA LINHA ───
      AUTH_TYPE: scram-sha-256
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == cmt-database
          
  # ─── pg-meta ──────────────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    networks:
      - supa-network
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ─── Kong Init (Gerador de Config) ────────────────────────────
  kong-init:
    image: alpine:3.19
    networks:
      - supa-network
    environment:
      KONG_ADMIN_USER: ${KONG_ADMIN_USER}
      KONG_ADMIN_PASSWORD: ${KONG_ADMIN_PASSWORD}
    volumes:
      - kong-config:/var/lib/kong
    command:
      - sh
      - -c
      - |
        set -e
        echo "Gerando kong.yml..."
        cat > /var/lib/kong/kong.yml << KONGEOF
        _format_version: "1.1"
        consumers:
          - username: $$KONG_ADMIN_USER
            basicauth_credentials:
              - username: $$KONG_ADMIN_USER
                password: $$KONG_ADMIN_PASSWORD
        services:
          - name: pg-meta
            url: http://meta:8080
            routes:
              - name: pg-meta-all
                strip_path: true
                paths:
                  - /pg/
          - name: studio
            url: http://studio:3000
            routes:
              - name: studio-route
                strip_path: false
                paths:
                  - /
                regex_priority: 0
            plugins:
              - name: basic-auth
                config:
                  hide_credentials: true
        plugins:
          - name: cors
            config:
              origins: ["*"]
              methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
              headers: ["Accept", "Authorization", "Content-Type", "apikey", "X-Client-Info"]
              max_age: 1728000
              credentials: true
        KONGEOF
        sed -i "s/\$\$KONG_ADMIN_USER/${KONG_ADMIN_USER}/g" /var/lib/kong/kong.yml
        sed -i "s/\$\$KONG_ADMIN_PASSWORD/${KONG_ADMIN_PASSWORD}/g" /var/lib/kong/kong.yml
        echo "kong.yml gerado!"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ─── Kong (API Gateway) ───────────────────────────────────────
  kong:
    image: kong:2.8.1
    ports:
      - "8000:8000"
    networks:
      - supa-network
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - kong-config:/var/lib/kong
    entrypoint:
      - sh
      - -c
      - |
        while [ ! -s /var/lib/kong/kong.yml ]; do sleep 2; done;
        /docker-entrypoint.sh kong docker-start
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ─── Supabase Studio ──────────────────────────────────────────
  studio:
    image: supabase/studio:20250113-83c9420
    networks:
      - supa-network
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://kong:8000
      AUTH_JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager


networks:
  supa-network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 172.20.50.0/24
  dokploy-network:
    external: true

volumes:
  db-data:
  kong-config:
